  #   restart: unless-stopped
  #   networks:
  #     - nexus-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "8065:8065"
    env_file: .env
    environment:
      SERVICE_MODE: api
      TEMPORAL_HOST: temporal:7233
      QDRANT_HOST: qdrant
      SCYLLA_HOSTS: scylladb
      NATS_URL: nats://nats:4222
      ALLOYDB_HOST: alloydb-omni
      ALLOYDB_PORT: "5432"
      MINIO_HOST: minio:9000
    depends_on:
      scylladb:
        condition: service_healthy
      alloydb-omni:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    networks:
      - nexus-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-worker
    env_file: .env
    environment:
      SERVICE_MODE: worker
      TEMPORAL_HOST: temporal:7233
      QDRANT_HOST: qdrant
      SCYLLA_HOSTS: scylladb
      NATS_URL: nats://nats:4222
      ALLOYDB_HOST: alloydb-omni
      ALLOYDB_PORT: "5432"
      MINIO_HOST: minio:9000
    depends_on:
      scylladb:
        condition: service_healthy
      alloydb-omni:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    networks:
      - nexus-network

volumes:
  minio:
    driver: local
  alloydb_data:
    driver: local
networks:
  nexus-network:
    driver: bridge
