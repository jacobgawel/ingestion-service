services:
  minio:
    image: minio/minio:latest
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - ${MINIO_PUBLISH_IP:-127.0.0.1}:9000:9000
      - ${MINIO_PUBLISH_IP:-127.0.0.1}:9001:9001
    networks:
      - nexus-network
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-very-safe-password}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  nats:
    image: nats:latest
    container_name: nexus-nats
    ports:
      - "4222:4222"
    restart: unless-stopped
    networks:
      - nexus-network

  alloydb-omni:
    image: google/alloydbomni:latest
    container_name: nexus-alloydb
    ports:
      - "5433:5432"
    volumes:
      - alloydb_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ALLOYDB_PASSWORD:-nexus-dev-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - nexus-network

  # mixedbread:
  #   image: michaelf34/infinity:latest
